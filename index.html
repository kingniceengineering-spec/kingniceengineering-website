<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Nice Engineering | MEP Contracting & General Supplier</title>
    <!-- Standard Free FontAwesome Pack -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        /* COLOR THEME VARIABLES */
        :root {
            --navy-dark: #07162c;
            --navy-main: #002147;
            --gold-solid: #dfa117;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* TOP CONATCT BAR */
        .top-bar {
            background-color: var(--navy-dark);
            color: var(--white);
            padding: 12px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-bottom: 3px solid var(--gold-solid);
            flex-wrap: wrap;
        }

        .top-bar .contact-info a {
            color: var(--white);
            text-decoration: none;
            margin-right: 25px;
            font-weight: bold;
        }

        .top-bar .contact-info a:hover {
            color: var(--gold-solid);
        }

        .top-bar .ntn-badge {
            background-color: var(--gold-solid);
            color: var(--navy-dark);
            padding: 4px 14px;
            border-radius: 4px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* NAVIGATION HEADER */
        header {
            background-color: var(--white);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-icon-wrapper {
            margin-right: 15px;
        }

        .logo-icon-wrapper i {
            font-size: 2.2rem;
            color: var(--gold-solid);
        }

        .brand-text h1 {
            color: var(--navy-main);
            font-size: 2rem;
            line-height: 0.9;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .brand-text h2 {
            color: var(--navy-dark);
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .brand-text span {
            color: var(--text-muted);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            border-top: 1px solid #e2e8f0;
            padding-top: 2px;
            margin-top: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--navy-main);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        nav ul li a:hover {
            color: var(--gold-solid);
        }

        /* HERO MAIN SECTION */
        .hero {
            background: linear-gradient(rgba(0, 33, 71, 0.9), rgba(7, 22, 44, 0.95)), 
                        url('https://unsplash.com') no-repeat center center/cover;
            color: var(--white);
            padding: 130px 8% 110px;
            text-align: center;
        }

        .hero .tagline {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--gold-solid);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .hero h2 {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero h2 span {
            color: var(--gold-solid);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 850px;
            margin: 0 auto 40px;
            color: #cbd5e1;
        }

        .cta-btn {
            display: inline-block;
            background-color: var(--gold-solid);
            color: var(--navy-dark);
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(223, 161, 23, 0.4);
            transition: 0.3s;
        }

        .cta-btn:hover {
            background-color: var(--white);
            color: var(--navy-main);
            transform: translateY(-3px);
        }

        /* CORE SECTIONS */
        section {
            padding: 80px 8%;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h2 {
            color: var(--navy-main);
            font-size: 2.4rem;
            font-weight: 800;
            position: relative;
            padding-bottom: 15px;
            display: inline-block;
            text-transform: uppercase;
        }

        .section-header h2::after {
            content: '';
            width: 80px;
            height: 4px;
            background-color: var(--gold-solid);
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .section-header p {
            color: var(--text-muted);
            margin-top: 15px;
            font-size: 1.1rem;
        }

        /* SERVICES GRID */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .service-card {
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.03);
            border-top: 5px solid var(--navy-main);
            transition: 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-10px);
            border-top-color: var(--gold-solid);
            box-shadow: 0 20px 45px rgba(0,0,0,0.09);
        }

        .service-card .icon-box {
            width: 65px;
            height: 65px;
            background-color: rgba(0, 33, 71, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .service-card:hover .icon-box {
            background-color: var(--gold-solid);
        }

        .service-card .icon-box i {
            font-size: 1.8rem;
            color: var(--navy-main);
        }

        .service-card h3 {
            color: var(--navy-main);
            font-size: 1.35rem;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .service-card ul {
            list-style: none;
        }

        .service-card ul li {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .service-card ul li i {
            color: var(--gold-solid);
            margin-right: 12px;
        }

        /* SUPPLIER SECTION */
        .supplier-section {
            background-color: var(--white);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
        }

        .product-card {
            background-color: var(--light-bg);
            padding: 25px 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--gold-solid);
            background-color: var(--white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .product-card i {
            font-size: 2.2rem;
            color: var(--navy-main);
            margin-bottom: 15px;
        }

        .product-card h4 {
            color: var(--navy-dark);
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        /* SPLIT SECTIONS */
        .split-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            align-items: start;
        }

        .benefits-list {
            list-style: none;
            margin-top: 20px;
        }

        .benefits-list li {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            background: var(--white);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
            border-left: 4px solid var(--navy-main);
        }

        .benefits-list li i {
            color: var(--gold-solid);
            font-size: 1.3rem;
            margin-right: 15px;
        }

        .benefits-list li h5 {
