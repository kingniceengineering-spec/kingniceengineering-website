    <style>
        /* LUXURY ENTERPRISE DESIGN SYSTEMS */
        :root {
            --navy-deep: #030d1a;
            --navy-brand: #002147;
            --navy-light: #0b2545;
            --gold-base: #dfa117;
            --gold-gradient: linear-gradient(135deg, #ffd700 0%, #dfa117 50%, #b8810b 100%);
            --glass-white: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-light: #f1f5f9;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #020813;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* PREMIUM GLASS TOPPING INFOBAR */
        .top-ticker {
            background-color: var(--navy-deep);
            color: #cbd5e1;
            padding: 14px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-bottom: 2px solid rgba(223, 161, 23, 0.3);
            font-weight: 600;
        }

        .top-ticker a {
            color: var(--text-light);
            text-decoration: none;
            margin-right: 25px;
            transition: 0.3s;
        }

        .top-ticker a:hover {
            color: var(--gold-base);
        }

        .top-ticker .ntn-tag {
            background: var(--gold-gradient);
            color: var(--navy-deep);
            padding: 5px 16px;
            border-radius: 50px;
            font-weight: 800;
            box-shadow: 0 0 15px rgba(223, 161, 23, 0.4);
            letter-spacing: 0.5px;
        }

        /* GLOWING STICKY NAVIGATION CONTROLLER */
        header {
            background: rgba(3, 13, 26, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-core {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .crown-gfx {
            margin-right: 15px;
            position: relative;
        }

        .crown-gfx i {
            font-size: 2.5rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(223, 161, 23, 0.5));
        }

        .brand-titles h1 {
            font-family: 'Cinzel', serif;
            color: var(--white);
            font-size: 2.5rem;
            line-height: 0.85;
            letter-spacing: 4px;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-titles h2 {
            color: #f8fafc;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .brand-titles span {
            color: var(--gold-base);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;

            margin-top: 3px;

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 35px;
        }

        nav ul li a {
            text-decoration: none;
            color: #cbd5e1;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--gold-gradient);
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: var(--gold-base);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* KINETIC HERO MATRIX WITH AMBIENT GLOW */

            padding: 180px 8% 150px;
            text-align: center;
            position: relative;
        }

        .hero-engine::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: rgba(223, 161, 23, 0.08);
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
        }

        .hero-engine .corporate-badge {

            border: 1px solid var(--glass-border);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold-base);
            margin-bottom: 25px;
            font-weight: bold;
        }

        .hero-engine h2 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 25px;
            letter-spacing: 2px;

        .hero-engine h2 span {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .hero-engine p {
            font-size: 1.25rem;
            max-width: 850px;
            margin: 0 auto 45px;
            color: #94a3b8;
            font-weight: 400;
        }

        .premium-btn {
            display: inline-block;
            background: var(--gold-gradient);
            color: var(--navy-deep);
            padding: 18px 45px;
            text-decoration: none;
            font-weight: 800;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 8px 30px rgba(223, 161, 23, 0.35);
            transition: 0.4s ease;
        }

        .premium-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(223, 161, 23, 0.5);
            background: #ffffff;
            color: var(--navy-brand);
        }

            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            position: relative;
            padding-bottom: 25px;

            height: 4px;
            background: var(--gold-gradient);

            bottom: 0;

            transform: translateX(-50%);
            border-radius: 2px;
        }

        .sec-head p {
            color: #64748b;
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: 600;
        }
